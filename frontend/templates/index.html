<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Location Guide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; color: white; }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 48px; margin-bottom: 10px; }
        p { font-size: 20px; margin-bottom: 30px; opacity: 0.9; }
        .btn { padding: 15px 40px; font-size: 18px; border: none; border-radius: 30px; cursor: pointer; margin: 10px; transition: transform 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .btn-primary { background: white; color: #667eea; }
        .btn-outline { background: transparent; border: 2px solid white; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📍</div>
        <h1>AI Location Guide</h1>
        <p>🤖 Smart Location Discovery & Recommendations</p>
        <a href="/login"><button class="btn btn-primary">Login</button></a>
        <a href="/register"><button class="btn btn-outline">Register</button></a>
    </div>
</body>
</html>
